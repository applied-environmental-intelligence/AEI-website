document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            await writer.write(bytes);
            await writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"705ec0b8-f894-4461-8fed-8d9147c65c9d\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n  <style>\n    * { box-sizing: border-box; }\n    html, body { margin: 0; height: 100%; }\n    body { background: #0a0d12; }\n    .lyr:hover { background: rgba(255,255,255,0.05) !important; }\n    .seg:hover { color: #e6e9ee !important; }\n    .ctlbtn:hover { background: rgba(255,255,255,0.1) !important; }\n    ::-webkit-scrollbar { width: 9px; height: 9px; }\n    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 6px; }\n    ::-webkit-scrollbar-track { background: transparent; }\n    @keyframes aeipulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-screen-label=\"MVP Dashboard\" style=\"height:100vh; display:flex; flex-direction:column; background:#0a0d12; color:#e6e9ee; font-family:Helvetica,Arial,sans-serif; -webkit-font-smoothing:antialiased; overflow:hidden;\">\n\n  <header style=\"flex:none; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:11px 18px; border-bottom:1px solid rgba(255,255,255,0.09); background:#0c1016;\">\n    <div style=\"display:flex; align-items:baseline; gap:12px; min-width:0;\">\n      <span style=\"font-size:19px; font-weight:800; letter-spacing:-0.04em;\">AEI<\u002Fspan>\n      <span style=\"font-size:12px; letter-spacing:0.04em; color:#8a929e; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">Puget Sound Resilience · ground-strength &amp; water monitoring<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:14px; flex:none;\">\n      <div style=\"display:flex; align-items:center; gap:7px; padding:5px 11px; border:1px solid rgba(57,211,160,0.4); border-radius:100px;\">\n        <span style=\"width:7px; height:7px; border-radius:50%; background:#39d3a0; animation:aeipulse 1.6s infinite;\"><\u002Fspan>\n        <span style=\"font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#39d3a0;\">Live · assimilating<\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"font-size:10px; letter-spacing:0.13em; text-transform:uppercase; color:#6b7280; border:1px solid rgba(255,255,255,0.12); border-radius:3px; padding:5px 9px;\">Synthetic data · MVP<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"flex:1; display:flex; min-height:0;\">\n\n    <!-- LEFT: layer modules -->\n    <aside style=\"flex:none; width:248px; border-right:1px solid rgba(255,255,255,0.09); background:#0c1016; overflow-y:auto; padding:16px 0;\">\n\n      <div style=\"padding:0 16px 14px;\">\n        <div style=\"font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#6b7280; margin-bottom:9px;\">Base surface<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:5px;\">\n          <button class=\"seg\" onclick=\"{{ surfStrength }}\" style=\"{{ segStrength }}\">Soil strength <span style=\"opacity:0.6; font-weight:400;\">· effective Vs<\u002Fspan><\u002Fbutton>\n          <button class=\"seg\" onclick=\"{{ surfVs30 }}\" style=\"{{ segVs30 }}\">Vs30 baseline <span style=\"opacity:0.6; font-weight:400;\">· static<\u002Fspan><\u002Fbutton>\n          <button class=\"seg\" onclick=\"{{ surfWater }}\" style=\"{{ segWater }}\">Water table <span style=\"opacity:0.6; font-weight:400;\">· depth<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"height:1px; background:rgba(255,255,255,0.07); margin:6px 16px 14px;\"><\u002Fdiv>\n\n      <div style=\"padding:0 10px;\">\n        <div style=\"font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#6b7280; padding:0 6px 7px;\">Live sensors<\u002Fdiv>\n        <button class=\"lyr\" onclick=\"{{ tgDas }}\" style=\"{{ rowDas }}\"><span style=\"{{ dotDas }}\"><\u002Fspan><span style=\"flex:1; text-align:left;\">DAS array <span style=\"color:#6b7280;\">· UW Seattle–Bothell<\u002Fspan><\u002Fspan><\u002Fbutton>\n        <button class=\"lyr\" onclick=\"{{ tgSeismic }}\" style=\"{{ rowSeismic }}\"><span style=\"{{ dotSeismic }}\"><\u002Fspan><span style=\"flex:1; text-align:left;\">PNW seismic network<\u002Fspan><\u002Fbutton>\n        <button class=\"lyr\" onclick=\"{{ tgMet }}\" style=\"{{ rowMet }}\"><span style=\"{{ dotMet }}\"><\u002Fspan><span style=\"flex:1; text-align:left;\">Meteorological stations<\u002Fspan><\u002Fbutton>\n\n        <div style=\"font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#6b7280; padding:14px 6px 7px;\">Forcing<\u002Fdiv>\n        <button class=\"lyr\" onclick=\"{{ tgRain }}\" style=\"{{ rowRain }}\"><span style=\"{{ dotRain }}\"><\u002Fspan><span style=\"flex:1; text-align:left;\">Rainfall <span style=\"color:#6b7280;\">· PRISM / radar<\u002Fspan><\u002Fspan><\u002Fbutton>\n\n        <div style=\"font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#6b7280; padding:14px 6px 7px;\">Infrastructure<\u002Fdiv>\n        <button class=\"lyr\" onclick=\"{{ tgInfra }}\" style=\"{{ rowInfra }}\"><span style=\"{{ dotInfra }}\"><\u002Fspan><span style=\"flex:1; text-align:left;\">Bridges, roads, key buildings<\u002Fspan><\u002Fbutton>\n        <button class=\"lyr\" onclick=\"{{ tgZoning }}\" style=\"{{ rowZoning }}\"><span style=\"{{ dotZoning }}\"><\u002Fspan><span style=\"flex:1; text-align:left;\">Single-story dwelling zones<\u002Fspan><\u002Fbutton>\n\n        <div style=\"font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#6b7280; padding:14px 6px 7px;\">Models<\u002Fdiv>\n        <button class=\"lyr\" onclick=\"{{ tgAssim }}\" style=\"{{ rowAssim }}\"><span style=\"{{ dotAssim }}\"><\u002Fspan><span style=\"flex:1; text-align:left;\">Data assimilation<\u002Fspan><\u002Fbutton>\n        <button class=\"lyr\" onclick=\"{{ tgForecast }}\" style=\"{{ rowForecast }}\"><span style=\"{{ dotForecast }}\"><\u002Fspan><span style=\"flex:1; text-align:left;\">Forecast engine <span style=\"color:#6b7280;\">· AI weather<\u002Fspan><\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"height:1px; background:rgba(255,255,255,0.07); margin:16px 16px 12px;\"><\u002Fdiv>\n      <div style=\"padding:0 16px;\">\n        <div style=\"font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#6b7280; margin-bottom:8px;\">{{ legendTitle }}<\u002Fdiv>\n        <div style=\"height:9px; border-radius:2px; background:{{ legendGrad }}; margin-bottom:5px;\"><\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; font-size:10px; color:#8a929e;\"><span>{{ legendMin }}<\u002Fspan><span>{{ legendMax }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <!-- CENTER: map -->\n    <main style=\"flex:1; position:relative; min-width:0; background:#080b10;\">\n      <canvas id=\"mapCanvas\" onclick=\"{{ onMapClick }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block; cursor:crosshair;\"><\u002Fcanvas>\n      <div style=\"position:absolute; left:14px; top:12px; z-index:2; pointer-events:none; display:flex; align-items:center; gap:9px;\">\n        <span style=\"font-size:12px; font-weight:700; letter-spacing:0.02em; color:#e6e9ee; background:rgba(8,11,16,0.6); padding:4px 9px; border-radius:3px;\">{{ surfaceName }}<\u002Fspan>\n        <span style=\"font-size:11px; color:#8a929e; background:rgba(8,11,16,0.6); padding:4px 9px; border-radius:3px;\">{{ phaseLabel }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fmain>\n\n    <!-- RIGHT: inspector -->\n    <aside style=\"flex:none; width:332px; border-left:1px solid rgba(255,255,255,0.09); background:#0c1016; overflow-y:auto; padding:16px 16px 22px;\">\n      <div style=\"font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#6b7280;\">Inspector<\u002Fdiv>\n      <div style=\"margin-top:7px; font-size:18px; font-weight:700; letter-spacing:-0.01em;\">{{ insTitle }}<\u002Fdiv>\n      <div style=\"margin-top:3px; font-size:12px; color:#8a929e;\">{{ insSub }}<\u002Fdiv>\n\n      <div style=\"margin-top:15px; display:grid; grid-template-columns:1fr 1fr; gap:8px;\">\n        <div style=\"border:1px solid rgba(255,255,255,0.09); border-radius:4px; padding:10px 11px;\">\n          <div style=\"font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#6b7280;\">Rainfall<\u002Fdiv>\n          <div style=\"margin-top:5px; font-size:18px; font-weight:700;\">{{ insRain }}<\u002Fdiv>\n          <div style=\"font-size:10px; color:#8a929e;\">mm / day<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,255,255,0.09); border-radius:4px; padding:10px 11px;\">\n          <div style=\"font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#6b7280;\">Water table<\u002Fdiv>\n          <div style=\"margin-top:5px; font-size:18px; font-weight:700;\">{{ insWater }}<\u002Fdiv>\n          <div style=\"font-size:10px; color:#8a929e;\">m below surface<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,255,255,0.09); border-radius:4px; padding:10px 11px;\">\n          <div style=\"font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#6b7280;\">Soil strength<\u002Fdiv>\n          <div style=\"margin-top:5px; font-size:18px; font-weight:700; color:{{ insStrengthColor }};\">{{ insStrength }}<\u002Fdiv>\n          <div style=\"font-size:10px; color:#8a929e;\">m/s effective Vs<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,255,255,0.09); border-radius:4px; padding:10px 11px;\">\n          <div style=\"font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#6b7280;\">Risk state<\u002Fdiv>\n          <div style=\"margin-top:7px; display:inline-flex; align-items:center; gap:6px; padding:3px 9px; border-radius:100px; background:{{ riskBg }};\"><span style=\"width:7px; height:7px; border-radius:50%; background:{{ riskColor }};\"><\u002Fspan><span style=\"font-size:12px; font-weight:600; color:{{ riskColor }};\">{{ riskText }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:18px; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#6b7280;\">Time series · this site<\u002Fdiv>\n      <canvas id=\"chartCanvas\" style=\"width:100%; height:300px; display:block; margin-top:8px;\"><\u002Fcanvas>\n\n      <div style=\"margin-top:16px; display:flex; align-items:center; justify-content:space-between;\">\n        <div style=\"font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#6b7280;\">At-risk infrastructure<\u002Fdiv>\n        <div style=\"font-size:10px; color:#8a929e;\">{{ atRiskCount }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:9px; display:flex; flex-direction:column; gap:7px;\">\n        <sc-for list=\"{{ atRisk }}\" as=\"a\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex; align-items:center; gap:10px; padding:9px 11px; border:1px solid rgba(255,255,255,0.09); border-left:2px solid {{ a.color }}; border-radius:3px;\">\n            <div style=\"flex:1; min-width:0;\">\n              <div style=\"font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ a.name }}<\u002Fdiv>\n              <div style=\"font-size:11px; color:#8a929e;\">{{ a.detail }}<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-size:11px; font-weight:700; color:{{ a.color }};\">{{ a.tag }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n\n  <!-- TIMELINE -->\n  <footer style=\"flex:none; border-top:1px solid rgba(255,255,255,0.09); background:#0c1016; padding:11px 18px 14px;\">\n    <div style=\"display:flex; align-items:center; gap:16px;\">\n      <div style=\"display:flex; align-items:center; gap:6px; flex:none;\">\n        <button class=\"ctlbtn\" onclick=\"{{ stepBack }}\" style=\"width:30px; height:30px; border-radius:4px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); color:#e6e9ee; cursor:pointer; font-size:13px;\">‹<\u002Fbutton>\n        <button class=\"ctlbtn\" onclick=\"{{ togglePlay }}\" style=\"width:38px; height:30px; border-radius:4px; border:1px solid rgba(78,161,255,0.5); background:rgba(78,161,255,0.16); color:#9cc6ff; cursor:pointer; font-size:12px; font-weight:700;\">{{ playLabel }}<\u002Fbutton>\n        <button class=\"ctlbtn\" onclick=\"{{ stepFwd }}\" style=\"width:30px; height:30px; border-radius:4px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); color:#e6e9ee; cursor:pointer; font-size:13px;\">›<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"flex:1; min-width:0;\">\n        <div style=\"display:flex; justify-content:space-between; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#6b7280; margin-bottom:6px;\">\n          <span>◀ Reanalysis<\u002Fspan><span style=\"color:#9cc6ff;\">{{ dateLabel }}<\u002Fspan><span>Forecast ▶<\u002Fspan>\n        <\u002Fdiv>\n        <div id=\"tlTrack\" style=\"position:relative; height:24px; cursor:pointer;\">\n          <div style=\"position:absolute; top:10px; left:0; right:0; height:4px; border-radius:3px; background:rgba(255,255,255,0.08);\"><\u002Fdiv>\n          <div style=\"position:absolute; top:10px; left:{{ nowPct }}; right:0; height:4px; border-radius:0 3px 3px 0; background:repeating-linear-gradient(90deg, rgba(78,161,255,0.22) 0 6px, rgba(78,161,255,0.08) 6px 12px);\"><\u002Fdiv>\n          <div style=\"position:absolute; top:4px; left:{{ nowPct }}; width:2px; height:16px; background:#4ea1ff;\"><\u002Fdiv>\n          <div style=\"position:absolute; top:0; left:{{ nowPct }}; transform:translateX(-50%); top:-1px; font-size:9px; color:#4ea1ff;\"><\u002Fdiv>\n          <div style=\"position:absolute; top:10px; left:0; width:{{ playPct }}; height:4px; border-radius:3px; background:linear-gradient(90deg,#39d3a0,#4ea1ff);\"><\u002Fdiv>\n          <div style=\"position:absolute; top:5px; left:{{ playPct }}; transform:translateX(-50%); width:14px; height:14px; border-radius:50%; background:#e6e9ee; border:2px solid #4ea1ff; box-shadow:0 1px 6px rgba(0,0,0,0.5);\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:none; font-size:11px; color:#8a929e; width:118px; text-align:right;\">{{ phaseLabel }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;defaultSurface&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;strength&quot;,&quot;vs30&quot;,&quot;water&quot;],&quot;default&quot;:&quot;strength&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;autoplay&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.GW = 64; this.GH = 42;\n    this.T = 64; this.NOW = 42;\n    this.gen();\n    // default selected: soft-soil site near Interbay/SODO\n    let best = 0, bestScore = 1e9;\n    for (let c = 0; c < this.cells.length; c++) {\n      const cell = this.cells[c];\n      if (!cell.land) continue;\n      const d = Math.hypot(cell.nx - 0.225, cell.ny - 0.68);\n      const score = d + cell.vs30 / 4000;\n      if (score < bestScore) { bestScore = score; best = c; }\n    }\n    this.state = {\n      surface: (props && props.defaultSurface) || 'strength',\n      t: this.NOW,\n      playing: false,\n      sel: best,\n      L: { das: true, seismic: true, met: false, rain: true, infra: true, zoning: false, assim: true, forecast: true },\n    };\n  }\n\n  /* ---------- seeded RNG ---------- */\n  rng(seed) { let a = seed >>> 0; return function () { a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }\n\n  /* ---------- geometry ---------- */\n  poly(pts, x, y) {\n    let inside = false;\n    for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {\n      const xi = pts[i][0], yi = pts[i][1], xj = pts[j][0], yj = pts[j][1];\n      if (((yi > y) !== (yj > y)) && (x < ((xj - xi) * (y - yi)) / (yj - yi) + xi)) inside = !inside;\n    }\n    return inside;\n  }\n\n  gen() {\n    const R = this.rng(73);\n    this.sound = [[0,0],[0.15,0],[0.135,0.12],[0.175,0.22],[0.125,0.33],[0.165,0.45],[0.115,0.57],[0.155,0.69],[0.105,0.82],[0.15,1],[0,1]];\n    this.lakeWA = [[0.655,0.07],[0.715,0.1],[0.725,0.3],[0.705,0.5],[0.72,0.7],[0.695,0.9],[0.65,0.93],[0.64,0.62],[0.652,0.32]];\n    this.canal = [[0.15,0.295],[0.655,0.305],[0.655,0.34],[0.15,0.33]];\n    this.lakeUnion = { x: 0.44, y: 0.33, r: 0.045 };\n\n    this.hills = [\n      { x: 0.37, y: 0.6, a: 1.0, s: 0.14 },\n      { x: 0.55, y: 0.2, a: 0.85, s: 0.12 },\n      { x: 0.5, y: 0.8, a: 0.95, s: 0.15 },\n      { x: 0.85, y: 0.55, a: 0.8, s: 0.16 },\n      { x: 0.28, y: 0.46, a: -0.45, s: 0.07 },\n      { x: 0.215, y: 0.68, a: -0.55, s: 0.075 },\n      { x: 0.34, y: 0.32, a: -0.3, s: 0.06 },\n    ];\n\n    const isWater = (nx, ny) => this.poly(this.sound, nx, ny) || this.poly(this.lakeWA, nx, ny) || this.poly(this.canal, nx, ny) || (Math.hypot(nx - this.lakeUnion.x, ny - this.lakeUnion.y) < this.lakeUnion.r);\n    this.isWater = isWater;\n\n    const elevAt = (nx, ny) => {\n      let e = 0;\n      for (const h of this.hills) { const dx = nx - h.x, dy = ny - h.y; e += h.a * Math.exp(-(dx * dx + dy * dy) / (2 * h.s * h.s)); }\n      return e;\n    };\n\n    // cells\n    this.cells = [];\n    let emin = 1e9, emax = -1e9;\n    for (let j = 0; j < this.GH; j++) {\n      for (let i = 0; i < this.GW; i++) {\n        const nx = (i + 0.5) / this.GW, ny = (j + 0.5) / this.GH;\n        const e = elevAt(nx, ny);\n        if (e < emin) emin = e; if (e > emax) emax = e;\n        this.cells.push({ i, j, nx, ny, e, land: !isWater(nx, ny) });\n      }\n    }\n    for (const c of this.cells) {\n      const en = (c.e - emin) / (emax - emin); // 0..1\n      c.en = en;\n      c.vs30 = Math.max(150, Math.min(740, 200 + en * 460 + (R() - 0.5) * 50));\n      c.wtBase = 1.1 + en * 6.2; // m, deeper on hills\n      c.obs = (R() - 0.5); // pseudo-obs correction seed\n    }\n\n    // rainfall regional time series: past storm + forecast storm\n    this.rainReg = [];\n    for (let t = 0; t < this.T; t++) {\n      const g = (m, a, s) => a * Math.exp(-((t - m) * (t - m)) / (2 * s * s));\n      let r = 0.6 + g(16, 26, 4.2) + g(30, 10, 3) + g(52, 32, 4.8);\n      r += R() * 1.4;\n      this.rainReg.push(r);\n    }\n    this.frontX = []; for (let t = 0; t < this.T; t++) this.frontX.push(((t * 0.018 + 0.1) % 1.2) - 0.1);\n\n    // saturation integration per cell over time\n    const nc = this.cells.length;\n    this.sat = new Float32Array(this.T * nc);\n    this.satA = new Float32Array(this.T * nc); // assimilated analysis\n    const rainAt = (t, c) => {\n      const fx = this.frontX[t];\n      const sp = Math.exp(-((c.nx - fx) * (c.nx - fx)) / (2 * 0.16 * 0.16));\n      const oro = 0.7 + 0.5 * (1 - c.nx); // west wetter\n      return this.rainReg[t] * (0.45 + 0.75 * sp) * oro;\n    };\n    this.rainCellNow = (t, c) => rainAt(t, c);\n    for (let c = 0; c < nc; c++) {\n      const cell = this.cells[c];\n      let s = 0.18 + cell.en * 0.05;\n      let sa = s;\n      const cap = 22 + cell.en * 26; // hills drain faster (higher capacity number)\n      for (let t = 0; t < this.T; t++) {\n        const r = rainAt(t, cell);\n        s = s * 0.9 + (r / cap);\n        if (s < 0) s = 0; if (s > 1) s = 1;\n        // analysis nudges toward obs (slightly different) and is smoother\n        const target = s + cell.obs * 0.05 * Math.sin(t * 0.2 + cell.i);\n        sa = sa * 0.86 + 0.14 * target;\n        if (sa < 0) sa = 0; if (sa > 1) sa = 1;\n        this.sat[t * nc + c] = s;\n        this.satA[t * nc + c] = sa;\n      }\n    }\n\n    // sensors\n    // DAS fiber: UW Seattle (U-District) -> UW Bothell (NE)\n    const dwp = [[0.5, 0.315], [0.55, 0.25], [0.6, 0.2], [0.67, 0.14], [0.75, 0.09], [0.81, 0.055]];\n    const dseg = []; let dtot = 0;\n    for (let i = 0; i < dwp.length - 1; i++) { const d = Math.hypot(dwp[i + 1][0] - dwp[i][0], dwp[i + 1][1] - dwp[i][1]); dseg.push(d); dtot += d; }\n    this.das = []; const DN = 13;\n    for (let k = 0; k < DN; k++) {\n      let f = (k / (DN - 1)) * dtot, i = 0;\n      while (i < dseg.length - 1 && f > dseg[i]) { f -= dseg[i]; i++; }\n      const tt = dseg[i] ? f / dseg[i] : 0;\n      this.das.push({ nx: dwp[i][0] + (dwp[i + 1][0] - dwp[i][0]) * tt, ny: dwp[i][1] + (dwp[i + 1][1] - dwp[i][1]) * tt, name: 'DAS-' + String(k + 1).padStart(2, '0') });\n    }\n    this.roads = [\n      { name: 'I-5', pts: [[0.34, 0.04], [0.33, 0.2], [0.31, 0.34], [0.3, 0.46], [0.31, 0.6], [0.33, 0.76], [0.35, 0.95]] },\n      { name: 'I-90', pts: [[0.27, 0.5], [0.45, 0.5], [0.66, 0.5], [0.85, 0.5]] },\n      { name: 'SR-520', pts: [[0.5, 0.235], [0.6, 0.235], [0.69, 0.24], [0.82, 0.255]] },\n    ];\n    this.seis = [\n      { nx: 0.3, ny: 0.46, code: 'SEW' }, { nx: 0.42, ny: 0.62, code: 'BHL' }, { nx: 0.56, ny: 0.3, code: 'KIRK' },\n      { nx: 0.82, ny: 0.5, code: 'BELL' }, { nx: 0.5, ny: 0.84, code: 'RNTN' }, { nx: 0.3, ny: 0.78, code: 'WSEA' },\n      { nx: 0.46, ny: 0.16, code: 'SHOR' }, { nx: 0.6, ny: 0.7, code: 'NEWC' },\n    ];\n    this.met = [{ nx: 0.33, ny: 0.55, code: 'M1' }, { nx: 0.6, ny: 0.45, code: 'M2' }, { nx: 0.45, ny: 0.74, code: 'M3' }, { nx: 0.5, ny: 0.26, code: 'M4' }, { nx: 0.8, ny: 0.66, code: 'M5' }];\n\n    this.infra = [\n      { nx: 0.69, ny: 0.24, name: 'SR-520 Bridge', type: 'bridge' },\n      { nx: 0.69, ny: 0.5, name: 'I-90 Bridge', type: 'bridge' },\n      { nx: 0.3, ny: 0.305, name: 'Ballard Bridge', type: 'bridge' },\n      { nx: 0.4, ny: 0.305, name: 'Aurora Bridge', type: 'bridge' },\n      { nx: 0.19, ny: 0.5, name: 'Alaskan Way Viaduct', type: 'road' },\n      { nx: 0.21, ny: 0.63, name: 'Harbor Island Port', type: 'port' },\n      { nx: 0.27, ny: 0.45, name: 'Downtown towers', type: 'building' },\n      { nx: 0.235, ny: 0.7, name: 'SODO warehouses', type: 'zone' },\n    ];\n    for (const a of this.infra) a.cell = this.cellAt(a.nx, a.ny);\n\n    this.zones = [\n      [[0.2, 0.62], [0.31, 0.62], [0.31, 0.78], [0.2, 0.78]],\n      [[0.42, 0.08], [0.55, 0.08], [0.55, 0.2], [0.42, 0.2]],\n    ];\n\n    this.places = [\n      { x: 0.27, y: 0.45, n: 'Downtown' }, { x: 0.22, y: 0.68, n: 'SODO / Interbay fill' }, { x: 0.3, y: 0.31, n: 'Ballard' },\n      { x: 0.4, y: 0.32, n: 'Fremont' }, { x: 0.52, y: 0.2, n: 'Shoreline' }, { x: 0.5, y: 0.5, n: 'Mercer' },\n      { x: 0.83, y: 0.5, n: 'Bellevue' }, { x: 0.5, y: 0.84, n: 'Renton' }, { x: 0.3, y: 0.8, n: 'West Seattle' },\n    ];\n  }\n\n  cellAt(nx, ny) {\n    const i = Math.max(0, Math.min(this.GW - 1, Math.floor(nx * this.GW)));\n    const j = Math.max(0, Math.min(this.GH - 1, Math.floor(ny * this.GH)));\n    return j * this.GW + i;\n  }\n  placeName(nx, ny) { let b = this.places[0], bd = 1e9; for (const p of this.places) { const d = Math.hypot(p.x - nx, p.y - ny); if (d < bd) { bd = d; b = p; } } return b.n; }\n\n  /* ---------- field accessors ---------- */\n  satArr() { return this.state.L.assim ? this.satA : this.sat; }\n  satOf(t, c) { return this.satArr()[t * this.cells.length + c]; }\n  strengthOf(t, c) { return this.cells[c].vs30 * (1 - 0.42 * this.satOf(t, c)); }\n  waterOf(t, c) { return this.cells[c].wtBase * (1 - 0.6 * this.satOf(t, c)); }\n  soilClass(vs) { return vs < 180 ? 'Soft soil (E)' : vs < 360 ? 'Stiff soil (D)' : vs < 560 ? 'Dense / very stiff (C)' : 'Rock (B)'; }\n\n  /* ---------- color ---------- */\n  hex(h) { h = h.replace('#', ''); return [parseInt(  20;\n    const drawForecastBg = (y0) => { ctx.fillStyle = 'rgba(78,161,255,0.06)'; ctx.fillRect(xOf(NOW), y0, xOf(T - 1) - xOf(NOW), ph); ctx.strokeStyle = 'rgba(78,161,255,0.5)'; ctx.setLineDash([3, 3]); ctx.beginPath(); ctx.moveTo(xOf(NOW), y0); ctx.lineTo(xOf(NOW), y0 + ph); ctx.stroke(); ctx.setLineDash([]); };\n    const label = (txt, y0, col) => { ctx.fillStyle = col || '#8a929e'; ctx.font = '600 10px Helvetica,Arial'; ctx.fillText(txt, padL + 2, y0 + 12); };\n\n    // panel 1: rainfall bars\n    let y0 = 0; drawForecastBg(y0);\n    label('Rainfall · mm/day', y0, '#7fd0ff');\n    const bw = gw / T;\n    for (let t = 0; t < T; t++) { const hh = (series.rain[t] / rmax) * (ph - 18); const fc = t > NOW ? 'rgba(127,208,255,0.45)' : 'rgba(127,208,255,0.85)'; ctx.fillStyle = fc; ctx.fillRect(xOf(t) - bw * 0.35, y0 + ph - hh, bw * 0.7, hh); }\n\n    // panel 2: water table (depth, inverted so shallow=up=risk)\n    y0 = ph + gap; drawForecastBg(y0);\n    label('Water table · m depth', y0, '#6fb0e8');\n    const wY = (w) => y0 + 16 + ((w - wmin) / (wmax - wmin)) * (ph - 22);\n    // forecast uncertainty band\n    ctx.fillStyle = 'rgba(111,176,232,0.18)'; ctx.beginPath();\n    for (let t = NOW; t < T; t++) { const u = (t - NOW) * 0.04; const x = xOf(t); if (t === NOW) ctx.moveTo(x, wY(series.water[t] - u)); else ctx.lineTo(x, wY(series.water[t] - u)); }\n    for (let t = T - 1; t >= NOW; t--) { const u = (t - NOW) * 0.04; ctx.lineTo(xOf(t), wY(series.water[t] + u)); }\n    ctx.closePath(); ctx.fill();\n    ctx.strokeStyle = '#6fb0e8'; ctx.lineWidth = 1.6; ctx.beginPath();\n    for (let t = 0; t < T; t++) { const x = xOf(t), y = wY(series.water[t]); t ? ctx.lineTo(x, y) : ctx.moveTo(x, y); if (t === NOW) { ctx.stroke(); ctx.setLineDash([4, 3]); ctx.beginPath(); ctx.moveTo(x, y); } }\n    ctx.stroke(); ctx.setLineDash([]);\n\n    // panel 3: soil strength + threshold\n    y0 = (ph + gap) * 2; drawForecastBg(y0);\n    label('Soil strength · m/s', y0, '#39d3a0');\n    const sY = (s) => y0 + ph - 4 - ((s - smin) / (smax - smin)) * (ph - 22);\n    const thr = 250;\n    if (thr > smin && thr < smax) { const ty = sY(thr); ctx.strokeStyle = 'rgba(255,93,93,0.6)'; ctx.setLineDash([2, 3]); ctx.beginPath(); ctx.moveTo(padL, ty); ctx.lineTo(W - padR, ty); ctx.stroke(); ctx.setLineDash([]); ctx.fillStyle = 'rgba(255,93,93,0.8)'; ctx.font = '600 9px Helvetica,Arial'; ctx.fillText('risk threshold', W - padR - 64, ty - 3); }\n    // uncertainty band\n    ctx.fillStyle = 'rgba(57,211,160,0.16)'; ctx.beginPath();\n    for (let t = NOW; t < T; t++) { const u = (t - NOW) * 2.2; const x = xOf(t); if (t === NOW) ctx.moveTo(x, sY(series.str[t] + u)); else ctx.lineTo(x, sY(series.str[t] + u)); }\n    for (let t = T - 1; t >= NOW; t--) { const u = (t - NOW) * 2.2; ctx.lineTo(xOf(t), sY(series.str[t] - u)); }\n    ctx.closePath(); ctx.fill();\n    ctx.strokeStyle = '#39d3a0'; ctx.lineWidth = 1.8; ctx.beginPath();\n    for (let t = 0; t < T; t++) { const x = xOf(t), y = sY(series.str[t]); t ? ctx.lineTo(x, y) : ctx.moveTo(x, y); if (t === NOW) { ctx.stroke(); ctx.setLineDash([4, 3]); ctx.beginPath(); ctx.moveTo(x, y); } }\n    ctx.stroke(); ctx.setLineDash([]);\n\n    // NOW playhead across all panels\n    const px = xOf(this.state.t);\n    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke();\n  }\n\n  /* ---------- handlers ---------- */\n  setSurface = (s) => this.setState({ surface: s });\n  toggle = (k) => this.setState((st) => ({ L: Object.assign({}, st.L, { [k]: !st.L[k] }) }));\n  togglePlay = () => this.setState((s) => ({ playing: !s.playing }));\n  stepBack = () => this.setState((s) => ({ t: Math.max(0, s.t - 1), playing: false }));\n  stepFwd = () => this.setState((s) => ({ t: Math.min(this.T - 1, s.t + 1), playing: false }));\n  onMapClick = (e) => {\n    const cv = e.currentTarget; const r = cv.getBoundingClientRect();\n    const nx = (e.clientX - r.left) / r.width, ny = (e.clientY - r.top) / r.height;\n    // hit test sensors first\n    let pick = null, pd = 0.03;\n    for (const d of this.das) { const dd = Math.hypot(d.nx - nx, d.ny - ny); if (dd < pd) { pd = dd; pick = { cell: this.cellAt(d.nx, d.ny), name: d.name }; } }\n    for (const s of this.seis) { const dd = Math.hypot(s.nx - nx, s.ny - ny); if (dd < pd) { pd = dd; pick = { cell: this.cellAt(s.nx, s.ny), name: 'Seismic ' + s.code }; } }\n    const cell = pick ? pick.cell : this.cellAt(nx, ny);\n    if (this.cells[cell] && this.cells[cell].land) this.setState({ sel: cell, _name: pick ? pick.name : null });\n  };\n\n  /* ---------- dot / row styles ---------- */\n  dot(on, col) { return { width: '9px', height: '9px', borderRadius: '2px', flex: 'none', background: on ? col : 'transparent', border: '1.5px solid ' + (on ? col : 'rgba(255,255,255,0.28)') }; }\n  row(on) { return { width: '100%', display: 'flex', alignItems: 'center', gap: '9px', padding: '8px 6px', border: 'none', background: 'transparent', color: on ? '#e6e9ee' : '#8a929e', fontSize: '12.5px', fontFamily: 'Helvetica,Arial,sans-serif', cursor: 'pointer', borderRadius: '5px', transition: 'background 120ms' }; }\n  seg(on) { return { width: '100%', textAlign: 'left', padding: '9px 11px', borderRadius: '5px', border: '1px solid ' + (on ? 'rgba(78,161,255,0.6)' : 'rgba(255,255,255,0.1)'), background: on ? 'rgba(78,161,255,0.16)' : 'transparent', color: on ? '#cfe2ff' : '#9aa3af', fontSize: '12.5px', fontWeight: on ? '700' : '500', fontFamily: 'Helvetica,Arial,sans-serif', cursor: 'pointer' }; }\n\n  dateStr(t) {\n    const base = new Date(2026, 2, 1); const d = new Date(base.getTime() + (t - this.NOW) * 86400000);\n    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });\n  }\n\n  renderVals() {\n    const st = this.state, L = st.L, t = st.t, c = st.sel;\n    const rd = this.rampDef(st.surface);\n    const grad = 'linear-gradient(90deg,' + rd.stops.map((s) => this.ramp(rd.stops, s[0])).join(',') + ')';\n    const cell = this.cells[c] || this.cells[0];\n    const strNow = this.strengthOf(t, c), watNow = this.waterOf(t, c), rainNow = this.rainCellNow(t, this.cells[c]);\n    const strCol = this.ramp([[150, '#ff5d5d'], [260, '#f5a623'], [400, '#9bcf5f'], [600, '#39d3a0']], strNow);\n    let riskText = 'Stable', riskColor = '#39d3a0', riskBg = 'rgba(57,211,160,0.14)';\n    if (strNow < 250) { riskText = 'Elevated'; riskColor = '#ff5d5d'; riskBg = 'rgba(255,93,93,0.14)'; }\n    else if (strNow < 330) { riskText = 'Watch'; riskColor = '#f5a623'; riskBg = 'rgba(245,166,35,0.14)'; }\n\n    // at-risk infrastructure\n    const ar = [];\n    for (const a of this.infra) {\n      const s = this.strengthOf(t, a.cell);\n      if (s < 330) ar.push({ name: a.name, detail: this.soilClass(this.cells[a.cell].vs30) + ' · ' + Math.round(s) + ' m/s', tag: s < 250 ? 'HIGH' : 'WATCH', color: s < 250 ? '#ff5d5d' : '#f5a623', s });\n    }\n    ar.sort((x, y) => x.s - y.s);\n    const atRisk = ar.length ? ar.slice(0, 5) : [{ name: 'No assets below threshold', detail: 'All monitored sites stable at this time', tag: 'OK', color: '#39d3a0' }];\n\n    const phase = t < this.NOW ? 'Reanalysis · −' + (this.NOW - t) + 'd' : t === this.NOW ? 'Now · live' : 'Forecast · +' + (t - this.NOW) + 'd';\n\n    return {\n      // base surface segmented\n      surfStrength: () => this.setSurface('strength'), surfVs30: () => this.setSurface('vs30'), surfWater: () => this.setSurface('water'),\n      segStrength: this.seg(st.surface === 'strength'), segVs30: this.seg(st.surface === 'vs30'), segWater: this.seg(st.surface === 'water'),\n      // layer toggles\n      tgDas: () => this.toggle('das'), tgSeismic: () => this.toggle('seismic'), tgMet: () => this.toggle('met'),\n      tgRain: () => this.toggle('rain'), tgInfra: () => this.toggle('infra'), tgZoning: () => this.toggle('zoning'),\n      tgAssim: () => this.toggle('assim'), tgForecast: () => this.toggle('forecast'),\n      rowDas: this.row(L.das), rowSeismic: this.row(L.seismic), rowMet: this.row(L.met), rowRain: this.row(L.rain),\n      rowInfra: this.row(L.infra), rowZoning: this.row(L.zoning), rowAssim: this.row(L.assim), rowForecast: this.row(L.forecast),\n      dotDas: this.dot(L.das, '#39d3a0'), dotSeismic: this.dot(L.seismic, '#4ea1ff'), dotMet: this.dot(L.met, '#f5a623'),\n      dotRain: this.dot(L.rain, '#7fd0ff'), dotInfra: this.dot(L.infra, '#cdd6e2'), dotZoning: this.dot(L.zoning, '#f5a623'),\n      dotAssim: this.dot(L.assim, '#39d3a0'), dotForecast: this.dot(L.forecast, '#4ea1ff'),\n      // legend\n      legendTitle: rd.title, legendGrad: grad, legendMin: rd.min, legendMax: rd.max,\n      surfaceName: rd.title, phaseLabel: phase,\n      // inspector\n      insTitle: st._name || this.placeName(cell.nx, cell.ny), insSub: this.soilClass(cell.vs30) + ' · Vs30 ' + Math.round(cell.vs30) + ' m/s',\n      insRain: rainNow.toFixed(1), insWater: watNow.toFixed(1), insStrength: Math.round(strNow), insStrengthColor: strCol,\n      riskText, riskColor, riskBg,\n      atRisk, atRiskCount: ar.length + ' of ' + this.infra.length,\n      // timeline\n      playLabel: st.playing ? '❚❚' : '▶', dateLabel: this.dateStr(t),\n      nowPct: (this.NOW / (this.T - 1) * 100) + '%', playPct: (t / (this.T - 1) * 100) + '%',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
