<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Mock</title>
    <style>
      :root {
        --blue: #007cff;
        --bg: url("/Users/stephanie/Documents/AEI/branding/website/current_site_12-25/background.png");
        --bg2: url("/Users/stephanie/Documents/AEI/branding/website/current_site_12-25/background2.png");
        --bg2-gif: url("/Users/stephanie/Documents/AEI/branding/website/current_site_12-25/cable_animation.gif");
        --bg-zoom: 1.28;
        --bg-shift: 7%;
        --bg2-shift: 0%;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        background: #fff;
        font-family: Helvetica, Arial, sans-serif;
      }

      .hero {
        position: relative;
        width: 100vw;
        min-height: 100vh;
        height: 100vh;
        height: 100svh;
        height: 100dvh;
        overflow: hidden;
        background-color: #fff;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        background-image: var(--bg);
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        transform: scale(var(--bg-zoom)) translateY(var(--bg-shift));
        transform-origin: center;
      }

      .hero__copy {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: auto;
      }

      .headline {
        position: absolute;
        line-height: 0.95;
        letter-spacing: -0.02em;
        font-weight: 900;
      }

      .headline .blue {
        color: var(--blue);
        display: block;
      }

      .headline .black {
        color: #000;
        display: block;
      }

      .headline--left {
        top: 10.8%;
        left: 12%;
        text-align: left;
        font-size: clamp(40px, 5.2vw, 86px);
      }

      .headline--right {
        top: 10.9%;
        right: 12%;
        text-align: left;
        font-size: clamp(40px, 5.2vw, 86px);
      }

      .bottom {
        position: absolute;
        left: 50%;
        bottom: 13%;
        transform: translateX(-50%);
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1;
        color: #000;
        font-size: clamp(45px, 6.8vw, 120px);
        opacity: 0;
        animation: fadeIn 1750ms forwards;
        animation-delay: 1.75s;
      }

      .scroll-arrow {
        position: absolute;
        left: 50%;
        bottom: 6%;
        transform: translateX(-50%);
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        opacity: 0;
        animation: fadeInOpacity 1750ms forwards;
        animation-delay: 2.75s;
        pointer-events: auto;
        background: transparent;
        border: none;
        transition: transform 200ms ease;
      }

      .scroll-arrow::before {
        content: "";
        width: 30px;
        height: 30px;
        border-left: 6px solid #000;
        border-bottom: 6px solid #000;
        transform: rotate(-45deg);
        display: block;
      }

      .scroll-arrow:hover,
      .scroll-arrow:focus-visible {
        transform: translateX(-50%) scale(1.15);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(3px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      @keyframes fadeInOpacity {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .next {
        position: relative;
        height: 140vh;
        min-height: 140vh;
        background-image: var(--bg2);
        background-repeat: no-repeat;
        background-position: 50% var(--bg2-shift);
        background-size: cover;
      }

      .next__gif {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 100vw;
        max-width: none;
        transform: translate(-50%, -15%);
        height: auto;
        object-fit: cover;
        aspect-ratio: 16 / 9;
        pointer-events: none;
        opacity: 0;
        z-index: 0;
        display: block;
        animation: fadeInOpacity 200ms ease-out forwards;
        animation-delay: 0s;
        animation-play-state: paused;
      }

      .next__reveal {
        position: absolute;
        left: 50%;
        top: 77.6%;
        width: 100vw;
        max-width: none;
        transform: translate(-50%, 0);
        pointer-events: none;
        opacity: 0;
        animation: fadeInOpacity 0ms ease-out forwards;
        animation-delay: 2s;
        animation-play-state: paused;
        z-index: 0;
        display: block;
      }

      .next__text {
        position: absolute;
        left: 53%;
        bottom: 45%;
        transform: translateX(-50%);
        width: 90vw;
        max-width: 1300px;
        z-index: 1;
        color: #fff;
        font-size: clamp(28px, 4.25vw, 56px);
        font-weight: 800;
        letter-spacing: -0.02em;
        text-align: left;
        text-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
        opacity: 0;
        animation: fadeInOpacity 1600ms ease-out forwards;
        animation-delay: 0.8s;
      }

      .next__badge {
        position: absolute;
        left: 40%;
        bottom: 27.5%;
        transform: translateX(-50%);
        width: 96vw;
        max-width: 1600px;
        z-index: 1;
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1;
        color: var(--blue);
        font-size: clamp(36px, 5vw, 68px);
        opacity: 0;
        text-align: right;
      }

      .next__badge.is-visible {
        animation: fadeIn 1750ms forwards;
        animation-delay: 1.9s;
      }
    </style>
  </head>

  <body>
    <section class="hero">
      <div class="hero__copy">
        <div class="headline headline--left">
          <span class="blue">Subsurface</span>
          <span class="black">monitoring.</span>
        </div>

        <div class="headline headline--right">
          <span class="blue">Wire theft</span>
          <span class="black">detection.</span>
        </div>

        <div class="bottom">In real time.</div>
        <button class="scroll-arrow" aria-label="Scroll down"></button>
      </div>
    </section>

    <section class="next" aria-label="Next section">
      <img class="next__gif" aria-hidden="true" src="cable_animation.gif" alt="" />
      <img class="next__reveal" aria-hidden="true" src="subsurface_reveal.gif" alt="" />
      <div class="next__text">
        AEI harnesses existing fiber optic networks to provide real time subsurface imaging and <br />
        cabled asset security.
      </div>
      <div class="next__badge">No new sensors needed.</div>
    </section>

    <script>
      const arrow = document.querySelector(".scroll-arrow");
      const nextSection = document.querySelector(".next");
      const nextBadge = document.querySelector(".next__badge");
      const nextGif = document.querySelector(".next__gif");
      const nextReveal = document.querySelector(".next__reveal");

      if (arrow && nextSection) {
        arrow.addEventListener("click", () => {
          const rect = nextSection.getBoundingClientRect();
          const target =
            rect.top + window.scrollY + nextSection.offsetHeight - window.innerHeight;
          const maxScroll =
            document.documentElement.scrollHeight - window.innerHeight;
          window.scrollTo({
            top: Math.min(target, maxScroll),
            behavior: "smooth",
          });
        });
      }

      if (nextBadge) {
        const observer = new IntersectionObserver(
          (entries, obs) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                nextBadge.classList.add("is-visible");
                obs.disconnect();
              }
            });
          },
          { threshold: 0.85 }
        );
        observer.observe(nextBadge);
      }

      if (nextGif) {
        const gifObserver = new IntersectionObserver(
          (entries, obs) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                nextGif.style.animationPlayState = "running";
                nextReveal.style.animationPlayState = "running";
                obs.disconnect();
              }
            });
          },
          { threshold: 0.35 }
        );
        gifObserver.observe(nextGif);
      }
